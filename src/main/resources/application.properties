spring.application.name=dream-hwhub
spring.datasource.url=jdbc:mysql://localhost:3306/dream_hwhub?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool configuration
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=120000
spring.datasource.hikari.pool-name=DreamHwhubPool

# File upload configuration (max 2GB per file, max 10GB per request)
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=10240MB
spring.servlet.multipart.enabled=true

# Tomcat connector configuration for large file uploads
server.tomcat.max-swallow-size=2147483648

# Transaction configuration
spring.transaction.default-timeout=30

# Import external configuration files
spring.config.import=optional:classpath:mail-config.properties,optional:classpath:password-key.properties

# Verification code expiration time (minutes)
app.verification-code.expiry-minutes=10

# Verification code cooldown time (seconds)
app.verification-code.cooldown-seconds=60

# Database initialization configuration
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:user_schema.sql,classpath:work_management.sql
spring.sql.init.continue-on-error=true